name: Lint and build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          check-latest: true
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Verify linting
        run: npm run lint
      - name: Create release
        run: npm run release
      - uses: actions/upload-artifact@v7
        with:
          path: dist/build.zip
          archive: true
